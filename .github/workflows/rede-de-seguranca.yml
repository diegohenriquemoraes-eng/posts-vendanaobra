name: Rede de seguranca

# O cron do Actions pode atrasar ou ser descartado em horario de pico, e um dia
# perdido passaria silencioso. Este job roda depois do horario e publica so se
# o post do dia nao saiu. Duas passadas: 13h e 17h (BRT).

on:
  schedule:
    - cron: "0 16 * * *"   # 13h BRT
    - cron: "0 20 * * *"   # 17h BRT
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  garantir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install --quiet pillow

      - name: Publicar se o post do dia nao saiu
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: python publicar.py --garantir

      - name: Avisar se nem a rede de seguranca conseguiu
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const hoje = new Date().toISOString().slice(0, 10)
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Sem post em " + hoje + " — a rede de seguranca tambem falhou",
              body: "Nem o horario normal nem a repescagem publicaram hoje.\n\n" +
                    "Run: " + context.serverUrl + "/" + context.repo.owner + "/" +
                    context.repo.repo + "/actions/runs/" + context.runId + "\n\n" +
                    "Causas comuns, em ordem de probabilidade:\n" +
                    "1. Token da Meta bloqueado (ver developers.facebook.com)\n" +
                    "2. Banco de frases esgotado (repor frases.json)\n"
            })

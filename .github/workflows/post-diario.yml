name: Post diario @vendanaobra

on:
  schedule:
    # 14:45 UTC; o job espera ate 15:00:00 UTC = 12:00:00 em Brasilia.
    # A folga existe porque o agendador do Actions costuma atrasar alguns minutos.
    # 1-5 = dispara de segunda a sexta; QUEM decide se posta hoje e o publicar.py
    # (deve_postar_hoje): a cadencia real e 1 post a cada 2 dias uteis, ancorada
    # no ultimo post. Dias em que nao toca a vez, o job roda e sai sem publicar.
    - cron: "45 14 * * 1-5"
  workflow_dispatch:
    inputs:
      id:
        description: "Forcar uma frase especifica (id do frases.json)"
        required: false
        type: string
      ensaio:
        description: "Ensaio: testa o caminho todo sem publicar"
        required: false
        type: boolean
        default: false
      refazer:
        description: "Refazer: republica o post de hoje da frase --id com a arte nova"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install --quiet pillow

      - name: Esperar o meio-dia em ponto
        if: github.event_name == 'schedule'
        run: |
          alvo=$(date -u -d "$(date -u +%F) 15:00:00" +%s)
          agora=$(date -u +%s)
          espera=$(( alvo - agora ))
          if [ "$espera" -gt 0 ]; then
            echo "esperando ${espera}s ate 15:00:00 UTC (12:00 BRT)"
            sleep "$espera"
          else
            echo "runner comecou atrasado (${espera}s); publicando agora"
          fi

      - name: Publicar carrossel
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: |
          args=""
          [ -n "${{ inputs.id }}" ] && args="$args --id ${{ inputs.id }}"
          [ "${{ inputs.ensaio }}" = "true" ] && args="$args --ensaio"
          [ "${{ inputs.refazer }}" = "true" ] && args="$args --refazer"
          python publicar.py $args

      - name: Abrir issue se o banco de frases acabar
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Post diario falhou em " + new Date().toISOString().slice(0, 10),
              body: "O workflow de post diario falhou. Ver o run: " +
                    context.serverUrl + "/" + context.repo.owner + "/" +
                    context.repo.repo + "/actions/runs/" + context.runId +
                    "\n\nCausas comuns: banco de frases esgotado ou token da Meta expirado."
            })
